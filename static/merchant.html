<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التاجر - نظام نقاط الولاء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15,15,26,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .navbar h2 {
            font-size: 18px;
            background: linear-gradient(90deg, #3742fa, #70a1ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .navbar .user-info { display: flex; align-items: center; gap: 15px; }
        .navbar .user-info span { color: #888; font-size: 14px; }
        .logout-btn {
            padding: 7px 18px;
            background: rgba(233,69,96,0.15);
            border: 1px solid rgba(233,69,96,0.3);
            border-radius: 8px;
            color: #e94560;
            cursor: pointer;
            font-size: 13px;
        }
        .logout-btn:hover { background: rgba(233,69,96,0.25); }
        .content { max-width: 1100px; margin: 0 auto; padding: 25px 20px; }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 22px;
            text-align: center;
        }
        .stat-card .number { font-size: 30px; font-weight: bold; margin-bottom: 5px; }
        .stat-card .label { color: #888; font-size: 13px; }
        .stat-card:nth-child(1) .number { color: #70a1ff; }
        .stat-card:nth-child(2) .number { color: #2ed573; }

        /* Sections */
        .section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Forms */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .form-group input, .form-group select {
            padding: 10px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #3742fa; }
        .form-group input::placeholder { color: #555; }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #3742fa; color: #fff; }
        .btn-success { background: #2ed573; color: #000; }
        .btn-danger { background: #e94560; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        /* Search */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-bar input:focus { border-color: #3742fa; }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            text-align: right;
            color: #888;
            font-weight: 500;
            white-space: nowrap;
        }
        td {
            padding: 10px 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .empty { text-align: center; padding: 30px; color: #555; }

        /* Alert */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            display: none;
        }
        .alert.error { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); color: #ff8a9e; }
        .alert.success { background: rgba(46,213,115,0.15); border: 1px solid rgba(46,213,115,0.3); color: #7bed9f; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { margin-bottom: 18px; font-size: 17px; }
        .modal .close-btn {
            float: left;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 20px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .history-item .add { color: #2ed573; }
        .history-item .deduct { color: #e94560; }
        .history-item .meta { color: #777; font-size: 12px; }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .navbar {
                padding: 12px 15px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .navbar h2 { font-size: 16px; }
            .navbar .user-info {
                gap: 8px;
                font-size: 12px;
                flex-wrap: wrap;
            }
            .navbar .user-info span { font-size: 11px; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
            .content { padding: 15px 10px; }
            .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 15px 10px; }
            .stat-card .number { font-size: 24px; }
            .stat-card .label { font-size: 11px; }
            .section { padding: 15px 12px; }
            .section-title { font-size: 15px; }
            .form-row { grid-template-columns: 1fr; gap: 10px; }
            .form-group label { font-size: 12px; }
            .form-group input, .form-group select { font-size: 14px; padding: 10px; }
            .btn { padding: 10px 16px; font-size: 13px; }
            .search-bar input { font-size: 13px; padding: 10px; }
            th, td { padding: 8px 6px; font-size: 12px; }
            .btn-sm { padding: 5px 10px; font-size: 11px; }
            .modal { padding: 20px 15px; width: 95%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2>🏪 <span id="storeName">لوحة التاجر</span></h2>
        <div class="user-info">
            <span id="merchantEmail"></span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </nav>

    <div class="content">
        <!-- الإحصائيات -->
        <div class="stats">
            <div class="stat-card"><div class="number" id="totalCust">0</div><div class="label">عدد العملاء</div></div>
            <div class="stat-card"><div class="number" id="totalBal">0</div><div class="label">إجمالي النقاط</div></div>
        </div>

        <!-- إضافة عميل -->
        <div class="section">
            <h3 class="section-title">إضافة عميل جديد</h3>
            <div id="custAlert" class="alert"></div>
            <form onsubmit="addCustomer(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>اسم العميل *</label>
                        <input type="text" id="custName" required placeholder="اسم العميل">
                    </div>
                    <div class="form-group">
                        <label>البريد (اختياري)</label>
                        <input type="email" id="custEmail" placeholder="customer@gmail.com" pattern=".+@gmail\.com$" title="يجب أن ينتهي البريد بـ @gmail.com">
                    </div>
                    <div class="form-group">
                        <label>الجوال (اختياري)</label>
                        <input type="text" id="custPhone" placeholder="05xxxxxxxx">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="addCustBtn">إضافة عميل</button>
            </form>
        </div>

        <!-- قائمة العملاء -->
        <div class="section">
            <h3 class="section-title">
                العملاء
                <span style="font-size:13px;color:#888" id="custCount"></span>
            </h3>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="بحث بالاسم أو الإيميل أو الجوال..." oninput="debounceSearch()">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>البريد</th>
                            <th>الجوال</th>
                            <th>الرصيد</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="customersTable">
                        <tr><td colspan="5" class="empty">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إدارة النقاط -->
    <div class="modal-overlay" id="pointsModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h3 id="modalTitle">إدارة النقاط</h3>
            <div id="modalAlert" class="alert"></div>

            <div style="margin-bottom:15px">
                <div style="display:flex;gap:8px;margin-bottom:12px">
                    <div style="flex:1;text-align:center;padding:12px;background:rgba(46,213,115,0.1);border-radius:8px">
                        <div style="font-size:22px;font-weight:bold;color:#2ed573" id="modalBalance">0</div>
                        <div style="font-size:12px;color:#888">الرصيد الحالي</div>
                    </div>
                </div>
            </div>

            <form onsubmit="submitPoints(event)">
                <div class="form-group" style="margin-bottom:12px">
                    <label>العملية</label>
                    <select id="pointsAction">
                        <option value="add">إضافة نقاط</option>
                        <option value="deduct">خصم نقاط</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label>الكمية</label>
                    <input type="number" id="pointsAmount" min="1" step="0.5" required placeholder="0">
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>ملاحظة (اختياري)</label>
                    <input type="text" id="pointsNote" placeholder="سبب العملية">
                </div>
                <button type="submit" class="btn btn-success" style="width:100%" id="pointsBtn">تنفيذ</button>
            </form>

            <h4 style="margin-top:20px;margin-bottom:10px;font-size:14px;color:#888">سجل الحركات</h4>
            <div id="historyList" style="max-height:200px;overflow-y:auto"></div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/static/login.html';

        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'merchant') window.location.href = '/static/login.html';
        document.getElementById('merchantEmail').textContent = user.email || '';
        if (user.merchant) document.getElementById('storeName').textContent = user.merchant.store_name;

        let currentCustomerId = null;
        let searchTimer = null;

        // جلب العملاء
        async function loadCustomers() {
            const tbody = document.getElementById('customersTable');
            try {
                const res = await fetch(API + '/api/customers/', { headers });
                if (res.status === 401) return logout();
                const list = await res.json();

                document.getElementById('totalCust').textContent = list.length;
                document.getElementById('custCount').textContent = `(${list.length})`;
                const totalBal = list.reduce((s, c) => s + (c.points_balance || 0), 0);
                document.getElementById('totalBal').textContent = totalBal.toLocaleString();

                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">لا يوجد عملاء. أضف أول عميل!</td></tr>';
                    return;
                }

                tbody.innerHTML = list.map(c => `
                    <tr>
                        <td><strong>${esc(c.name)}</strong></td>
                        <td>${esc(c.email || '-')}</td>
                        <td>${esc(c.phone || '-')}</td>
                        <td style="font-weight:bold;color:${c.points_balance > 0 ? '#2ed573' : '#888'}">${c.points_balance}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="openPoints('${c.id}','${esc(c.name)}',${c.points_balance})">نقاط</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">خطأ في التحميل</td></tr>';
            }
        }

        // بحث
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(doSearch, 400);
        }

        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return loadCustomers();

            const tbody = document.getElementById('customersTable');
            try {
                const res = await fetch(API + '/api/customers/search?q=' + encodeURIComponent(q), { headers });
                const list = await res.json();
                document.getElementById('custCount').textContent = `(${list.length} نتيجة)`;

                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">لا توجد نتائج</td></tr>';
                    return;
                }

                tbody.innerHTML = list.map(c => `
                    <tr>
                        <td><strong>${esc(c.name)}</strong></td>
                        <td>${esc(c.email || '-')}</td>
                        <td>${esc(c.phone || '-')}</td>
                        <td style="font-weight:bold;color:${c.points_balance > 0 ? '#2ed573' : '#888'}">${c.points_balance}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="openPoints('${c.id}','${esc(c.name)}',${c.points_balance})">نقاط</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">خطأ في البحث</td></tr>';
            }
        }

        // إضافة عميل
        async function addCustomer(e) {
            e.preventDefault();
            const btn = document.getElementById('addCustBtn');
            btn.disabled = true;
            hideAlertEl('custAlert');

            try {
                const res = await fetch(API + '/api/customers/', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        name: document.getElementById('custName').value,
                        email: document.getElementById('custEmail').value || null,
                        phone: document.getElementById('custPhone').value || null,
                    })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail || 'خطأ');
                showAlertEl('custAlert', 'تم إضافة العميل بنجاح!', 'success');
                document.getElementById('custName').value = '';
                document.getElementById('custEmail').value = '';
                document.getElementById('custPhone').value = '';
                loadCustomers();
            } catch (err) {
                showAlertEl('custAlert', err.message, 'error');
            }
            btn.disabled = false;
        }

        // مودال النقاط
        function openPoints(id, name, balance) {
            currentCustomerId = id;
            document.getElementById('modalTitle').textContent = 'إدارة نقاط: ' + name;
            document.getElementById('modalBalance').textContent = balance;
            document.getElementById('pointsAmount').value = '';
            document.getElementById('pointsNote').value = '';
            hideAlertEl('modalAlert');
            loadHistory(id);
            document.getElementById('pointsModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('pointsModal').classList.remove('show');
            currentCustomerId = null;
        }

        async function submitPoints(e) {
            e.preventDefault();
            const btn = document.getElementById('pointsBtn');
            btn.disabled = true;
            hideAlertEl('modalAlert');

            try {
                const res = await fetch(API + '/api/points/', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        customer_id: currentCustomerId,
                        action: document.getElementById('pointsAction').value,
                        amount: parseFloat(document.getElementById('pointsAmount').value),
                        note: document.getElementById('pointsNote').value || null,
                    })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail || 'خطأ');

                document.getElementById('modalBalance').textContent = d.balance_after;
                showAlertEl('modalAlert', 'تمت العملية بنجاح!', 'success');
                document.getElementById('pointsAmount').value = '';
                document.getElementById('pointsNote').value = '';
                loadHistory(currentCustomerId);
                loadCustomers();
            } catch (err) {
                showAlertEl('modalAlert', err.message, 'error');
            }
            btn.disabled = false;
        }

        async function loadHistory(custId) {
            const div = document.getElementById('historyList');
            div.innerHTML = '<div style="color:#555;text-align:center;padding:10px">جاري التحميل...</div>';
            try {
                const res = await fetch(API + '/api/points/history/' + custId, { headers });
                const list = await res.json();
                if (list.length === 0) {
                    div.innerHTML = '<div style="color:#555;text-align:center;padding:10px">لا توجد حركات</div>';
                    return;
                }
                div.innerHTML = list.map(t => `
                    <div class="history-item">
                        <div>
                            <span class="${t.action}">${t.action === 'add' ? '+' : '-'}${t.amount}</span>
                            <span style="color:#aaa;margin-right:8px">→ ${t.balance_after}</span>
                        </div>
                        <div class="meta">
                            ${t.note ? esc(t.note) + ' • ' : ''}${formatDate(t.created_at)}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                div.innerHTML = '<div style="color:#e94560;text-align:center;padding:10px">خطأ</div>';
            }
        }

        // Helpers
        function showAlertEl(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
        }
        function hideAlertEl(id) {
            document.getElementById(id).style.display = 'none';
        }
        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('ar-SA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function esc(s) {
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/static/login.html';
        }

        // تحميل البيانات
        loadCustomers();
    </script>
</body>
</html>
