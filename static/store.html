<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المكافآت</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15,15,26,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .navbar h2 {
            font-size: 18px;
            background: linear-gradient(90deg, #ffa502, #ff6348);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .navbar .user-info { display: flex; align-items: center; gap: 10px; }
        .navbar .balance-badge {
            padding: 6px 14px;
            background: rgba(46,213,115,0.15);
            border: 1px solid rgba(46,213,115,0.3);
            border-radius: 20px;
            color: #2ed573;
            font-weight: bold;
            font-size: 14px;
        }
        .logout-btn {
            padding: 7px 14px;
            background: rgba(233,69,96,0.15);
            border: 1px solid rgba(233,69,96,0.3);
            border-radius: 8px;
            color: #e94560;
            cursor: pointer;
            font-size: 13px;
        }
        .content { max-width: 900px; margin: 0 auto; padding: 25px 15px; }

        /* Login */
        .login-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 0 15px;
        }
        .login-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 8px;
            font-size: 22px;
            background: linear-gradient(90deg, #ffa502, #ff6348);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-card p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: #ffa502; }
        .form-group input::placeholder { color: #555; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(135deg, #ffa502, #ff6348); color: #fff; }
        .btn-success { background: #2ed573; color: #000; }
        .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            display: none;
        }
        .alert.error { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); color: #ff8a9e; }
        .alert.success { background: rgba(46,213,115,0.15); border: 1px solid rgba(46,213,115,0.3); color: #7bed9f; }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, transform 0.2s;
        }
        .product-card:hover { border-color: rgba(255,165,2,0.3); transform: translateY(-2px); }
        .product-card .prod-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
        }
        .product-card .prod-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; line-height: 1.3; }
        .product-card .prod-desc { font-size: 11px; color: #888; margin-bottom: 8px; flex: 1; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .prod-cat {
            font-size: 10px;
            color: #ffa502;
            background: rgba(255,165,2,0.1);
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .product-card .prod-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto;
        }
        .product-card .prod-price {
            font-size: 16px;
            font-weight: bold;
            color: #ffa502;
        }
        .product-card .prod-price small { font-size: 11px; color: #888; }
        .product-card .prod-stock { font-size: 11px; color: #888; }
        .product-card .btn-sm { width: 100%; text-align: center; }

        /* Custom Confirm Modal */
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,165,2,0.2);
            border-radius: 16px;
            padding: 28px 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        .confirm-box .confirm-icon { font-size: 40px; margin-bottom: 12px; }
        .confirm-box .confirm-title { font-size: 17px; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .confirm-box .confirm-msg { font-size: 14px; color: #aaa; margin-bottom: 24px; line-height: 1.6; }
        .confirm-box .confirm-btns { display: flex; gap: 10px; }
        .confirm-box .confirm-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .confirm-box .btn-confirm-yes { background: linear-gradient(135deg, #ffa502, #ff6348); color: #fff; }
        .confirm-box .btn-confirm-no { background: rgba(255,255,255,0.08); color: #aaa; }

        /* Section titles */
        .section-title {
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-sub { color: #888; font-size: 13px; margin-bottom: 15px; }

        /* Redemptions */
        .redemption-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .badge.pending { background: rgba(255,165,2,0.15); color: #ffa502; }
        .badge.approved { background: rgba(46,213,115,0.15); color: #2ed573; }
        .badge.rejected { background: rgba(233,69,96,0.15); color: #e94560; }
        .badge.delivered { background: rgba(112,161,255,0.15); color: #70a1ff; }

        .hidden { display: none; }

        @media (max-width: 600px) {
            .navbar { padding: 12px 12px; flex-wrap: wrap; gap: 8px; }
            .navbar h2 { font-size: 15px; }
            .content { padding: 15px 8px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .product-card { padding: 10px; }
            .product-card .prod-img { height: 80px; border-radius: 8px; }
            .product-card .prod-name { font-size: 13px; }
            .product-card .prod-price { font-size: 14px; }
            .btn-sm { padding: 8px 12px; font-size: 12px; }
            .login-card { padding: 24px 18px; }
            .redemption-item { padding: 10px 12px; font-size: 13px; }
        }
        @media (max-width: 360px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .product-card .prod-img { height: 65px; }
            .product-card .prod-name { font-size: 12px; }
            .product-card .prod-price { font-size: 13px; }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-card">
                <h2 id="loginStoreTitle">متجر المكافآت</h2>
                <p id="loginStoreDesc">سجل دخولك لاستبدال نقاطك بمكافآت</p>
                <div id="loginAlert" class="alert"></div>

                <!-- خطوة 1: إدخال الإيميل -->
                <form id="emailForm" onsubmit="sendCode(event)">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" placeholder="user@gmail.com" required pattern=".+@gmail\.com$" title="يجب أن ينتهي البريد بـ @gmail.com">
                    </div>
                    <button type="submit" class="btn btn-primary" id="sendCodeBtn">إرسال كود التحقق</button>
                </form>

                <!-- خطوة 2: إدخال الكود -->
                <form id="codeForm" class="hidden" onsubmit="verifyCode(event)">
                    <div class="form-group">
                        <label>كود التحقق</label>
                        <input type="text" id="loginCode" placeholder="أدخل الكود المكون من 6 أرقام" required maxlength="6" style="text-align:center;font-size:20px;letter-spacing:8px">
                    </div>
                    <button type="submit" class="btn btn-primary" id="verifyBtn">تأكيد</button>
                    <p style="margin-top:12px;font-size:12px;color:#888">لم يصلك الكود؟ <a href="#" onclick="backToEmail()" style="color:#ffa502">حاول مرة أخرى</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- شاشة المتجر -->
    <div id="storeScreen" class="hidden">
        <nav class="navbar">
            <h2>🎁 <span id="navStoreName">المتجر</span></h2>
            <div class="user-info">
                <span id="custName" style="color:#aaa;font-size:13px"></span>
                <span class="balance-badge">⭐ <span id="custBalance">0</span> نقطة</span>
                <button class="logout-btn" onclick="storeLogout()">خروج</button>
            </div>
        </nav>

        <div class="content">
            <div id="storeAlert" class="alert"></div>

            <!-- المنتجات -->
            <h3 class="section-title">المنتجات المتوفرة</h3>
            <p class="section-sub">استبدل نقاطك بالمكافآت التالية</p>
            <div class="products-grid" id="productsGrid">
                <p style="color:#555">جاري التحميل...</p>
            </div>

            <!-- سجل الاستبدالات -->
            <h3 class="section-title" style="margin-top:30px">سجل استبدالاتي</h3>
            <div id="myRedemptions" style="margin-top:10px">
                <p style="color:#555">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <!-- مودال التأكيد المخصص -->
    <div class="confirm-overlay" id="confirmModal">
        <div class="confirm-box">
            <div class="confirm-icon">🎁</div>
            <div class="confirm-title" id="confirmTitle">تأكيد الاستبدال</div>
            <div class="confirm-msg" id="confirmMsg">هل تريد استبدال هذا المنتج؟</div>
            <div class="confirm-btns">
                <button class="btn-confirm-yes" id="confirmYes">حسناً</button>
                <button class="btn-confirm-no" id="confirmNo">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال بيانات المنتج اليدوي -->
    <div class="confirm-overlay" id="manualModal">
        <div class="confirm-box" style="max-width:400px;text-align:right">
            <div class="confirm-icon">📝</div>
            <div class="confirm-title">أدخل البيانات المطلوبة</div>
            <div id="manualFields" style="margin:15px 0"></div>
            <div id="manualAlert" style="color:#e94560;font-size:13px;margin-bottom:8px;display:none"></div>
            <div class="confirm-btns">
                <button class="btn-confirm-yes" id="manualSubmit">🎁 تأكيد الاستبدال</button>
                <button class="btn-confirm-no" id="manualCancel">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        const merchantId = params.get('merchant');

        if (!merchantId) {
            document.body.innerHTML = '<div style="text-align:center;margin-top:100px;color:#e94560"><h2>رابط غير صالح</h2><p>لا يوجد معرّف للمتجر</p></div>';
        }

        let customer = null;
        let productsData = [];

        // جلب بيانات المتجر
        let storeInfo = null;
        async function loadStoreInfo() {
            try {
                const res = await fetch(API + '/api/store/merchant/' + merchantId);
                if (!res.ok) throw new Error();
                storeInfo = await res.json();
                document.getElementById('loginStoreTitle').textContent = 'متجر ' + storeInfo.store_name;
                document.getElementById('loginStoreDesc').textContent = storeInfo.store_description || 'سجل دخولك لاستبدال نقاطك بمكافآت';
                document.getElementById('navStoreName').textContent = storeInfo.store_name;
                document.title = storeInfo.store_name + ' - متجر المكافآت';

                // تطبيق لون المتجر المخصص
                const tc = storeInfo.theme_color || '#ffa502';
                document.documentElement.style.setProperty('--tc', tc);
                document.querySelectorAll('.btn-primary').forEach(b => b.style.background = `linear-gradient(135deg, ${tc}, ${tc}dd)`);
                document.querySelectorAll('.navbar h2').forEach(h => h.style.background = `linear-gradient(90deg, ${tc}, ${tc}cc)`);
                // لوجو
                if (storeInfo.logo_url) {
                    document.getElementById('loginStoreTitle').innerHTML = '<img src="' + esc(storeInfo.logo_url) + '" style="height:40px;border-radius:8px;vertical-align:middle;margin-left:8px" onerror="this.style.display=\'none\'"> متجر ' + esc(storeInfo.store_name);
                }
            } catch (e) {
                document.body.innerHTML = '<div style="text-align:center;margin-top:100px;color:#e94560"><h2>المتجر غير موجود</h2><p>تأكد من الرابط</p></div>';
            }
        }
        if (merchantId) loadStoreInfo();

        // إرسال كود التحقق
        async function sendCode(e) {
            e.preventDefault();
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';
            hideAlert('loginAlert');

            try {
                const email = document.getElementById('loginEmail').value;
                const res = await fetch(API + '/api/store/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, merchant_id: merchantId })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail);

                // في بيئة التطوير نعرض الكود مباشرة
                if (d.code) {
                    showAlert('loginAlert', 'كود التحقق: ' + d.code, 'success');
                } else {
                    showAlert('loginAlert', 'تم إرسال الكود لبريدك', 'success');
                }
                document.getElementById('emailForm').classList.add('hidden');
                document.getElementById('codeForm').classList.remove('hidden');
            } catch (err) {
                showAlert('loginAlert', err.message, 'error');
            }
            btn.disabled = false;
            btn.textContent = 'إرسال كود التحقق';
        }

        function backToEmail() {
            document.getElementById('codeForm').classList.add('hidden');
            document.getElementById('emailForm').classList.remove('hidden');
            hideAlert('loginAlert');
        }

        // التحقق من الكود
        async function verifyCode(e) {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            hideAlert('loginAlert');

            try {
                const email = document.getElementById('loginEmail').value;
                const code = document.getElementById('loginCode').value;
                const res = await fetch(API + '/api/store/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, merchant_id: merchantId, code })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail);

                customer = d.customer;
                showStore();
            } catch (err) {
                showAlert('loginAlert', err.message, 'error');
            }
            btn.disabled = false;
        }

        // عرض المتجر
        function showStore() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('storeScreen').classList.remove('hidden');
            // شارة المستوى
            let tierBadge = '';
            if (storeInfo && Array.isArray(storeInfo.tiers)) {
                let best = null;
                for (const t of storeInfo.tiers) {
                    if (customer.total_earned !== undefined && customer.total_earned >= t.min_points && (!best || t.min_points > best.min_points)) best = t;
                }
                if (best) tierBadge = `<span class='badge' style='background:${best.color};color:#222;margin-right:6px;font-size:11px'>${esc(best.name)}</span>`;
            }
            document.getElementById('custName').innerHTML = esc(customer.name) + (tierBadge ? ' ' + tierBadge : '');
            document.getElementById('custBalance').textContent = customer.points_balance;
            loadStoreProducts();
            loadMyRedemptions();
        }

        // جلب المنتجات
        async function loadStoreProducts() {
            const grid = document.getElementById('productsGrid');
            try {
                const res = await fetch(API + '/api/store/merchant/' + merchantId + '/products');
                const list = await res.json();
                productsData = list;

                if (list.length === 0) {
                    grid.innerHTML = '<p style="color:#555;grid-column:1/-1;text-align:center;padding:30px">لا توجد منتجات متوفرة حالياً</p>';
                    return;
                }

                grid.innerHTML = list.map(p => {
                    const canAfford = customer.points_balance >= p.points_cost;
                    const isManual = p.product_type === 'manual';
                    return `
                    <div class="product-card">
                        ${p.image_url ? '<img class="prod-img" src="' + esc(p.image_url) + '" alt="' + esc(p.name) + '" onerror="this.style.display=\'none\'">' : '<div class="prod-img" style="display:flex;align-items:center;justify-content:center;font-size:36px">' + (isManual ? '📝' : '🎁') + '</div>'}
                        ${p.category ? '<span class="prod-cat">' + esc(p.category) + '</span>' : ''}
                        ${isManual ? '<span class="prod-cat" style="background:rgba(255,165,2,0.2);color:#ffa502;right:auto;left:8px">يدوي</span>' : ''}
                        <div class="prod-name">${esc(p.name)}</div>
                        <div class="prod-desc">${esc(p.description || '')}</div>
                        <div class="prod-footer">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <div class="prod-price">${p.points_cost} <small>نقطة</small></div>
                                <div class="prod-stock">${p.stock === -1 ? '✅ متوفر' : (p.stock > 0 ? '📦 ' + p.stock : '⛔ نفد')}</div>
                            </div>
                            <button class="btn btn-success btn-sm" ${canAfford && p.stock !== 0 ? '' : 'disabled'} onclick="redeemProduct('${p.id}','${esc(p.name)}',${p.points_cost})">
                                ${canAfford ? '🎁 استبدال' : '⚠️ رصيد غير كافٍ'}
                            </button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                grid.innerHTML = '<p style="color:#e94560">خطأ في تحميل المنتجات</p>';
            }
        }

        // مودال التأكيد المخصص
        function showConfirm(title, msg, icon) {
            return new Promise(resolve => {
                document.getElementById('confirmTitle').textContent = title;
                document.getElementById('confirmMsg').textContent = msg;
                document.getElementById('confirmModal').querySelector('.confirm-icon').textContent = icon || '🎁';
                document.getElementById('confirmModal').classList.add('show');
                document.getElementById('confirmYes').onclick = () => { document.getElementById('confirmModal').classList.remove('show'); resolve(true); };
                document.getElementById('confirmNo').onclick = () => { document.getElementById('confirmModal').classList.remove('show'); resolve(false); };
            });
        }

        // استبدال منتج
        async function redeemProduct(productId, productName, cost) {
            const product = productsData.find(p => p.id === productId);
            const isManual = product && product.product_type === 'manual' && product.required_fields && product.required_fields.length > 0;

            let customerNotes = null;

            if (isManual) {
                customerNotes = await showManualForm(product.required_fields);
                if (customerNotes === null) return;
            } else {
                const ok = await showConfirm('تأكيد الاستبدال', `هل تريد استبدال "${productName}" مقابل ${cost} نقطة؟`, '🎁');
                if (!ok) return;
            }

            hideAlert('storeAlert');

            try {
                const bodyData = { product_id: productId };
                if (customerNotes) bodyData.customer_notes = customerNotes;

                const res = await fetch(API + '/api/store/redeem?customer_id=' + customer.id + '&merchant_id=' + merchantId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail);

                customer.points_balance = d.new_balance;
                document.getElementById('custBalance').textContent = d.new_balance;
                showAlert('storeAlert', '🎉 ' + d.detail, 'success');
                loadStoreProducts();
                loadMyRedemptions();
            } catch (err) {
                showAlert('storeAlert', err.message, 'error');
            }
        }

        // مودال البيانات اليدوية
        function showManualForm(fields) {
            return new Promise(resolve => {
                const container = document.getElementById('manualFields');
                container.innerHTML = fields.map((f, i) => `
                    <div style="margin-bottom:10px">
                        <label style="display:block;font-size:13px;margin-bottom:4px;color:#ccc">${esc(f)} *</label>
                        <input type="text" class="manual-input" data-field="${esc(f)}" required placeholder="أدخل ${esc(f)}" style="width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;box-sizing:border-box">
                    </div>
                `).join('');
                document.getElementById('manualAlert').style.display = 'none';
                document.getElementById('manualModal').classList.add('show');

                document.getElementById('manualSubmit').onclick = () => {
                    const inputs = container.querySelectorAll('.manual-input');
                    const lines = [];
                    let valid = true;
                    inputs.forEach(inp => {
                        if (!inp.value.trim()) { valid = false; inp.style.borderColor = '#e94560'; }
                        else { inp.style.borderColor = 'rgba(255,255,255,0.15)'; lines.push(inp.dataset.field + ': ' + inp.value.trim()); }
                    });
                    if (!valid) {
                        document.getElementById('manualAlert').textContent = 'يرجى تعبئة جميع الحقول';
                        document.getElementById('manualAlert').style.display = 'block';
                        return;
                    }
                    document.getElementById('manualModal').classList.remove('show');
                    resolve(lines.join('\n'));
                };
                document.getElementById('manualCancel').onclick = () => {
                    document.getElementById('manualModal').classList.remove('show');
                    resolve(null);
                };
            });
        }

        // سجل استبدالاتي
        async function loadMyRedemptions() {
            const div = document.getElementById('myRedemptions');
            try {
                const res = await fetch(API + '/api/store/my-redemptions?customer_id=' + customer.id + '&merchant_id=' + merchantId);
                const list = await res.json();

                if (list.length === 0) {
                    div.innerHTML = '<p style="color:#555;text-align:center;padding:20px">لم تقم بأي استبدال بعد</p>';
                    return;
                }

                const statusAr = { pending: 'قيد المراجعة', approved: 'مقبول', rejected: 'مرفوض' };
                div.innerHTML = list.map(r => `
                    <div class="redemption-item">
                        <div>
                            <strong>${esc(r.product_name)}</strong>
                            <span style="color:#ffa502;margin-right:8px">-${r.points_spent} نقطة</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px">
                            <span class="badge ${r.status}">${statusAr[r.status] || r.status}</span>
                            <span style="color:#666;font-size:12px">${formatDate(r.created_at)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                div.innerHTML = '<p style="color:#e94560">خطأ</p>';
            }
        }

        // Helpers
        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
        }
        function hideAlert(id) { document.getElementById(id).style.display = 'none'; }
        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('ar-SA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function esc(s) {
            if (!s) return '';
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }
        function storeLogout() {
            customer = null;
            document.getElementById('storeScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginCode').value = '';
            document.getElementById('codeForm').classList.add('hidden');
            document.getElementById('emailForm').classList.remove('hidden');
            hideAlert('loginAlert');
        }
    </script>
</body>
