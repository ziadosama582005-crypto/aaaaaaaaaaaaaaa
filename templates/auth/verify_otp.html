{% extends "base.html" %}

{% block title %}التحقق من الكود - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 20px;">
    <div class="card" style="text-align: center; padding: 40px;">
        <h1 style="font-size: 32px; margin-bottom: 10px;">
            <i class="fas fa-shield-alt"></i>
        </h1>
        <h2 style="margin-bottom: 15px; color: var(--primary-light);">التحقق من الكود</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">
            أدخل الكود المرسل إلى<br>
            <strong style="color: var(--text);">{{ identifier }}</strong>
        </p>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <input 
                    type="text" 
                    name="otp" 
                    placeholder="000000"
                    maxlength="6"
                    pattern="\d{6}"
                    required
                    style="width: 100%; padding: 15px; text-align: center; font-size: 24px; letter-spacing: 8px; background: rgba(255,255,255,0.1); border: 2px solid var(--primary); border-radius: 8px; color: var(--text); font-family: 'Courier New', monospace; font-weight: bold;"
                    autofocus
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 15px;">
                <i class="fas fa-check"></i>
                التحقق
            </button>
        </form>
        
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">
                لم تستقبل الكود؟
            </p>
            <a href="/login" style="color: var(--primary-light); text-decoration: none; font-weight: 600;">
                أرسل أو غير البريد/الهاتف
            </a>
        </div>
    </div>
</div>

<script>
// تنسيق إدخال الكود
document.querySelector('input[name="otp"]').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
});
</script>
{% endblock %}
