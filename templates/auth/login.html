{% extends "base.html" %}

{% block title %}تسجيل الدخول - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 20px;">
    <div class="card" style="text-align: center; padding: 40px;">
        <h1 style="font-size: 32px; margin-bottom: 10px;">
            <i class="fas fa-lock"></i>
        </h1>
        <h2 style="margin-bottom: 30px; color: var(--primary-light);">تسجيل الدخول</h2>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; text-align: right; margin-bottom: 10px; font-size: 14px; color: var(--text-muted);">
                    البريد الإلكتروني أو رقم الهاتف
                </label>
                <input 
                    type="text" 
                    name="identifier" 
                    placeholder="example@email.com أو +966501234567"
                    required
                    style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text); font-family: 'Tajawal';"
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 15px;">
                <i class="fas fa-arrow-left"></i>
                التالي
            </button>
        </form>
        
        <p style="margin-top: 20px; font-size: 13px; color: var(--text-muted);">
            <i class="fas fa-info-circle"></i>
            سيتم إرسال كود التحقق إليك
        </p>
    </div>
</div>
{% endblock %}
