{% extends "base.html" %}

{% block title %}المتجر - {{ config.SITE_NAME }}{% endblock %}

{% block extra_css %}
<style>
    .shop-filters {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border-color);
        height: fit-content;
        position: sticky;
        top: 100px;
    }
    
    .filter-group {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    
    .filter-group:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }
    
    .filter-group h3 {
        font-size: 14px;
        color: var(--primary-light);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .filter-checkbox {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        font-size: 14px;
    }
    
    .filter-checkbox input {
        width: 16px;
        height: 16px;
        cursor: pointer;
        accent-color: var(--primary);
    }
    
    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
    }
    
    .product-card {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        transition: all 0.3s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
    }
    
    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(108, 92, 231, 0.3);
        border-color: var(--primary);
    }
    
    .product-image {
        width: 100%;
        height: 180px;
        background: rgba(108, 92, 231, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        overflow: hidden;
        position: relative;
    }
    
    .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .product-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: var(--danger);
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
    }
    
    .product-info {
        padding: 15px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    
    .product-category {
        font-size: 12px;
        color: var(--primary-light);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .product-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        min-height: 40px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .product-description {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 12px;
        flex-grow: 1;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .product-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 1px solid var(--border-color);
    }
    
    .product-price {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    
    .product-price-current {
        font-size: 18px;
        color: var(--success);
        font-weight: 700;
    }
    
    .product-price-original {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: line-through;
    }
    
    .product-actions {
        display: flex;
        gap: 8px;
    }
    
    .product-actions button {
        flex: 1;
        padding: 8px;
        font-size: 12px;
        border-radius: 6px;
    }
    
    .view-details {
        background: rgba(108, 92, 231, 0.2);
        color: var(--primary);
        border: 1px solid var(--primary);
    }
    
    .view-details:hover {
        background: var(--primary);
        color: white;
    }
    
    .add-to-cart-btn {
        background: var(--primary);
        color: white;
        border: none;
    }
    
    .add-to-cart-btn:hover {
        background: var(--primary-light);
    }
    
    .shop-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        gap: 15px;
        flex-wrap: wrap;
    }
    
    .search-box {
        flex: 1;
        min-width: 200px;
    }
    
    .search-box input {
        width: 100%;
    }
    
    .sort-select {
        min-width: 200px;
    }
    
    .results-count {
        font-size: 14px;
        color: var(--text-muted);
    }
    
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
    }
    
    .empty-state i {
        font-size: 48px;
        opacity: 0.3;
        margin-bottom: 20px;
    }
    
    @media (max-width: 768px) {
        .shop-container {
            grid-template-columns: 1fr !important;
        }
        
        .shop-filters {
            position: static;
            margin-bottom: 25px;
        }
        
        .product-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
        
        .shop-toolbar {
            flex-direction: column;
        }
        
        .search-box,
        .sort-select {
            width: 100% !important;
        }
    }
</style>
{% endblock %}

{% block content %}
<h1 style="font-size: 32px; margin-bottom: 30px;">
    <i class="fas fa-store"></i>
    المتجر
</h1>

<!-- شريط البحث والفرز -->
<div class="shop-toolbar">
    <div class="search-box">
        <input 
            type="text" 
            id="search-input" 
            placeholder="ابحث عن منتج..."
            style="width: 100%; padding: 12px 15px;"
        >
    </div>
    
    <select id="sort-select" class="sort-select" style="padding: 12px 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text); font-family: 'Tajawal';">
        <option value="newest">الأحدث</option>
        <option value="price-low">السعر: من الأقل إلى الأعلى</option>
        <option value="price-high">السعر: من الأعلى إلى الأقل</option>
        <option value="popular">الأكثر شهرة</option>
    </select>
    
    <span class="results-count">
        جاري التحميل...
    </span>
</div>

<!-- الحاوية الرئيسية -->
<div style="display: grid; grid-template-columns: 250px 1fr; gap: 30px;" class="shop-container">
    <!-- الفلاتر الجانبية -->
    <aside class="shop-filters">
        <h2 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-filter"></i>
            التصفية
        </h2>
        
        <!-- فلاتر الأقسام -->
        <div class="filter-group">
            <h3>الأقسام</h3>
            <div id="categories-filter"></div>
        </div>
        
        <!-- فلاتر السعر -->
        <div class="filter-group">
            <h3>نطاق السعر</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="number" id="price-min" placeholder="من" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text);">
                <input type="number" id="price-max" placeholder="إلى" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text);">
            </div>
        </div>
        
        <!-- أزرار الفلتر -->
        <button onclick="applyFilters()" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">
            <i class="fas fa-check"></i>
            تطبيق الفلاتر
        </button>
        <button onclick="resetFilters()" class="btn btn-secondary" style="width: 100%;">
            <i class="fas fa-redo"></i>
            إعادة تعيين
        </button>
    </aside>
    
    <!-- شبكة المنتجات -->
    <main>
        <div id="products-container" class="product-grid"></div>
        <div id="empty-state" class="empty-state" style="display: none;">
            <i class="fas fa-search"></i>
            <h3 style="margin-bottom: 10px;">لم نجد نتائج</h3>
            <p style="color: var(--text-muted);">جرب تغيير معايير البحث أو الفلاتر</p>
        </div>
    </main>
</div>

<script>
// متغيرات عامة
let allProducts = [];
let allCategories = [];
let currentFilters = {
    search: '',
    category: [],
    priceMin: 0,
    priceMax: Infinity,
    sort: 'newest'
};

// تحميل البيانات
async function loadData() {
    try {
        // تحميل المنتجات
        const productsRes = await fetch('/api/get-products');
        const productsData = await productsRes.json();
        allProducts = productsData.products || [];
        
        // تحميل الأقسام
        const categoriesRes = await fetch('/api/get-categories');
        const categoriesData = await categoriesRes.json();
        allCategories = categoriesData.categories || [];
        
        // إنشاء فلاتر الأقسام
        renderCategoryFilters();
        
        // عرض المنتجات
        displayProducts();
    } catch (err) {
        console.error('خطأ:', err);
    }
}

// عرض فلاتر الأقسام
function renderCategoryFilters() {
    const container = document.getElementById('categories-filter');
    let html = '';
    
    allCategories.forEach(cat => {
        html += `
            <label class="filter-checkbox">
                <input type="checkbox" value="${cat.id}" onchange="handleCategoryFilter('${cat.id}', this.checked)">
                <span>${cat.name}</span>
            </label>
        `;
    });
    
    container.innerHTML = html;
}

// معالج تصفية الأقسام
function handleCategoryFilter(categoryId, isChecked) {
    if (isChecked) {
        if (!currentFilters.category.includes(categoryId)) {
            currentFilters.category.push(categoryId);
        }
    } else {
        currentFilters.category = currentFilters.category.filter(c => c !== categoryId);
    }
}

// تطبيق الفلاتر
function applyFilters() {
    currentFilters.priceMin = parseFloat(document.getElementById('price-min').value) || 0;
    currentFilters.priceMax = parseFloat(document.getElementById('price-max').value) || Infinity;
    displayProducts();
}

// إعادة تعيين الفلاتر
function resetFilters() {
    currentFilters = {
        search: '',
        category: [],
        priceMin: 0,
        priceMax: Infinity,
        sort: 'newest'
    };
    
    document.getElementById('price-min').value = '';
    document.getElementById('price-max').value = '';
    document.getElementById('search-input').value = '';
    document.getElementById('sort-select').value = 'newest';
    document.querySelectorAll('.filter-checkbox input').forEach(cb => cb.checked = false);
    
    displayProducts();
}

// تطبيق البحث
document.getElementById('search-input').addEventListener('input', (e) => {
    currentFilters.search = e.target.value.toLowerCase();
    displayProducts();
});

// تطبيق الفرز
document.getElementById('sort-select').addEventListener('change', (e) => {
    currentFilters.sort = e.target.value;
    displayProducts();
});

// عرض المنتجات المُفلترة
function displayProducts() {
    let filtered = allProducts.filter(product => {
        // البحث
        const matchSearch = product.name.toLowerCase().includes(currentFilters.search) ||
                          (product.description && product.description.toLowerCase().includes(currentFilters.search));
        
        // الأقسام
        const matchCategory = currentFilters.category.length === 0 || 
                            currentFilters.category.includes(product.category_id);
        
        // السعر
        const matchPrice = product.price >= currentFilters.priceMin && 
                         product.price <= currentFilters.priceMax;
        
        return matchSearch && matchCategory && matchPrice;
    });
    
    // الفرز
    switch(currentFilters.sort) {
        case 'price-low':
            filtered.sort((a, b) => a.price - b.price);
            break;
        case 'price-high':
            filtered.sort((a, b) => b.price - a.price);
            break;
        case 'popular':
            filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            break;
        default:
            // newest
            break;
    }
    
    // تحديث عدد النتائج
    document.querySelector('.results-count').textContent = `${filtered.length} منتج`;
    
    // عرض المنتجات أو رسالة فارغة
    if (filtered.length === 0) {
        document.getElementById('products-container').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }
    
    document.getElementById('products-container').style.display = 'grid';
    document.getElementById('empty-state').style.display = 'none';
    
    let html = '';
    filtered.forEach(product => {
        const categoryName = allCategories.find(c => c.id === product.category_id)?.name || 'عام';
        const discount = product.discount || 0;
        
        html += `
            <div class="product-card">
                <div class="product-image">
                    ${product.image_url ? 
                        `<img src="${product.image_url}" alt="${product.name}">` : 
                        '<i class="fas fa-image"></i>'
                    }
                    ${discount > 0 ? `<span class="product-badge">-${discount}%</span>` : ''}
                </div>
                
                <div class="product-info">
                    <div class="product-category">${categoryName}</div>
                    <a href="/product/${product.id}" style="text-decoration: none;">
                        <h3 class="product-name">${product.name}</h3>
                    </a>
                    <p class="product-description">${product.description || 'بدون وصف'}</p>
                </div>
                
                <div class="product-footer">
                    <div class="product-price">
                        <span class="product-price-current">${product.price} ر.س</span>
                        ${discount > 0 ? 
                            `<span class="product-price-original">${(product.price / (1 - discount/100)).toFixed(2)} ر.س</span>` : 
                            ''
                        }
                    </div>
                </div>
                
                <div style="padding: 0 15px 15px; display: flex; gap: 8px;">
                    <a href="/product/${product.id}" class="view-details" style="flex: 1; padding: 8px; text-align: center; border-radius: 6px; text-decoration: none; display: inline-block;">
                        <i class="fas fa-eye"></i> عرض
                    </a>
                    <button class="add-to-cart-btn" onclick="addToCart('${product.id}', '${product.name}', ${product.price})" style="flex: 1;">
                        <i class="fas fa-cart-plus"></i> أضف
                    </button>
                </div>
            </div>
        `;
    });
    
    document.getElementById('products-container').innerHTML = html;
}

// إضافة للسلة
function addToCart(productId, productName, price) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let existingItem = cart.find(item => item.id === productId);
    
    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({ id: productId, name: productName, price: price, quantity: 1 });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    
    // إظهار إشعار
    const btn = event.target.closest('button');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> تمت الإضافة';
    setTimeout(() => {
        btn.innerHTML = originalText;
    }, 1500);
}

// تحميل البيانات عند فتح الصفحة
loadData();
</script>
{% endblock %}
