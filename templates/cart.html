{% extends "base.html" %}

{% block title %}السلة - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<style>
    .cart-wrapper {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 20px;
        align-items: start;
    }

    .cart-items {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
    }

    .cart-item {
        display: flex;
        gap: 15px;
        padding: 15px;
        border-bottom: 1px solid var(--border);
        align-items: center;
    }

    .cart-item:last-child {
        border-bottom: none;
    }

    .item-image {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        border-radius: 8px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 30px;
    }

    .item-info {
        flex: 1;
    }

    .item-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 5px;
    }

    .item-category {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 8px;
    }

    .delivery-badge {
        display: inline-block;
        padding: 4px 8px;
        background: var(--success-light);
        color: var(--success);
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .delivery-badge.manual {
        background: var(--warning-light);
        color: var(--warning);
    }

    .item-price {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary);
    }

    .item-actions {
        display: flex;
        gap: 10px;
        margin-right: auto;
    }

    .btn-remove {
        padding: 6px 12px;
        background: var(--danger-light);
        color: var(--danger);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-remove:hover {
        background: var(--danger);
        color: white;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
    }

    .empty-icon {
        font-size: 60px;
        margin-bottom: 20px;
    }

    .empty-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 10px;
    }

    .empty-text {
        color: var(--text-muted);
        margin-bottom: 30px;
    }

    .btn-shop {
        padding: 12px 30px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: transform 0.3s ease;
    }

    .btn-shop:hover {
        transform: translateY(-2px);
    }

    .cart-summary {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
        position: sticky;
        top: 20px;
    }

    .summary-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 14px;
    }

    .summary-row.total {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary);
        padding-top: 12px;
        border-top: 1px solid var(--border);
        margin-top: 12px;
    }

    .btn-checkout {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        margin-top: 20px;
        transition: transform 0.3s ease;
    }

    .btn-checkout:hover:not(:disabled) {
        transform: translateY(-2px);
    }

    .btn-checkout:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .alert {
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 13px;
    }

    .alert.error {
        background: var(--danger-light);
        color: var(--danger);
        border-left: 4px solid var(--danger);
    }

    .alert.success {
        background: var(--success-light);
        color: var(--success);
        border-left: 4px solid var(--success);
    }

    @media (max-width: 768px) {
        .cart-wrapper {
            grid-template-columns: 1fr;
        }

        .cart-summary {
            position: static;
        }
    }
</style>

<h1 style="font-size: 32px; margin-bottom: 30px;">
    <i class="fas fa-shopping-cart"></i>
    سلة التسوق
</h1>

<div id="alert-container"></div>

<div class="cart-wrapper">
    <div class="cart-items">
        <div id="loading" style="text-align: center; padding: 40px;">
            <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 15px;">جاري تحميل السلة...</p>
        </div>

        <div id="cart-content"></div>
    </div>

    <div class="cart-summary">
        <div class="summary-title">ملخص الطلب</div>
        
        <div class="summary-row">
            <span>عدد العناصر:</span>
            <span id="items-count">0</span>
        </div>

        <div class="summary-row">
            <span>إجمالي السعر:</span>
            <span id="total-price">0 ر.س</span>
        </div>

        <button id="checkout-btn" class="btn-checkout" disabled>
            إتمام عملية الشراء
        </button>

        <a href="/categories" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 15px; text-decoration: none;">
            ← العودة للتسوق
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadCart);

    async function loadCart() {
        try {
            const response = await fetch('/api/cart/view');
            const data = await response.json();

            if (data.status === 'error') {
                showAlert(data.message, 'error');
                return;
            }

            displayCart(data);
        } catch (error) {
            console.error('❌ خطأ في تحميل السلة:', error);
            showAlert('حدث خطأ في تحميل السلة', 'error');
        }
    }

    function displayCart(data) {
        const cartContent = document.getElementById('cart-content');
        const items = data.items || [];

        document.getElementById('loading').style.display = 'none';

        if (items.length === 0) {
            cartContent.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🛍️</div>
                    <div class="empty-title">السلة فارغة</div>
                    <p class="empty-text">لديك 0 عناصر في السلة</p>
                    <a href="/categories" class="btn-shop">ابدأ التسوق الآن</a>
                </div>
            `;
            document.getElementById('checkout-btn').disabled = true;
            return;
        }

        let html = '';
        items.forEach(item => {
            const deliveryLabel = item.delivery_type === 'instant' ? '⚡ فوري' : '📦 يدوي';
            const deliveryClass = item.delivery_type === 'instant' ? '' : 'manual';
            
            html += `
                <div class="cart-item">
                    <div class="item-image">📦</div>
                    <div class="item-info">
                        <div class="item-name">${escapeHtml(item.item_name)}</div>
                        <div class="item-category">${escapeHtml(item.category || 'بدون فئة')}</div>
                        <div class="delivery-badge ${deliveryClass}">${deliveryLabel}</div>
                        ${item.buyer_details ? `<div style="font-size: 11px; color: var(--text-muted);">📝 ${escapeHtml(item.buyer_details)}</div>` : ''}
                    </div>
                    <div class="item-price">${item.price} ر.س</div>
                    <div class="item-actions">
                        <button class="btn-remove" onclick="removeFromCart('${item.product_id}')">
                            ✕ حذف
                        </button>
                    </div>
                </div>
            `;
        });

        cartContent.innerHTML = html;

        // تحديث الملخص
        document.getElementById('items-count').textContent = items.length;
        const totalPrice = items.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-price').textContent = `${totalPrice} ر.س`;

        // تفعيل زر الشراء
        document.getElementById('checkout-btn').disabled = false;
    }

    async function removeFromCart(productId) {
        try {
            const response = await fetch('/api/cart/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: productId })
            });

            const data = await response.json();

            if (data.status === 'success') {
                showAlert('تم حذف العنصر من السلة', 'success');
                loadCart();
            } else {
                showAlert(data.message || 'حدث خطأ', 'error');
            }
        } catch (error) {
            console.error('❌ خطأ:', error);
            showAlert('حدث خطأ أثناء الحذف', 'error');
        }
    }

    document.getElementById('checkout-btn').addEventListener('click', checkout);

    async function checkout() {
        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.textContent = 'جاري المعالجة...';

        try {
            const response = await fetch('/api/cart/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const data = await response.json();

            if (data.status === 'success') {
                showAlert('✅ تمت عملية الشراء بنجاح!', 'success');
                setTimeout(() => {
                    window.location.href = '/my_purchases';
                }, 2000);
            } else {
                showAlert(data.message || 'حدث خطأ في الشراء', 'error');
                btn.disabled = false;
                btn.textContent = 'إتمام عملية الشراء';
            }
        } catch (error) {
            console.error('❌ خطأ:', error);
            showAlert('حدث خطأ أثناء الشراء', 'error');
            btn.disabled = false;
            btn.textContent = 'إتمام عملية الشراء';
        }
    }

    function showAlert(message, type) {
        const container = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = `alert ${type}`;
        alert.textContent = message;
        container.innerHTML = '';
        container.appendChild(alert);

        setTimeout(() => {
            alert.style.opacity = '0';
            alert.style.transition = 'opacity 0.3s ease';
            setTimeout(() => alert.remove(), 300);
        }, 4000);
    }

    function escapeHtml(unsafe) {
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>

<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
{% endblock %}
