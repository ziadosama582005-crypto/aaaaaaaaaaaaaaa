{% extends "base.html" %}

{% block title %}السلة - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<h1 style="font-size: 32px; margin-bottom: 30px;">
    <i class="fas fa-shopping-cart"></i>
    سلة التسوق
</h1>

<div id="cart-container">
    <div style="text-align: center; padding: 60px 20px; background: var(--card); border-radius: 12px;">
        <i class="fas fa-inbox" style="font-size: 48px; opacity: 0.5; margin-bottom: 20px;"></i>
        <p style="font-size: 18px; color: var(--text-muted);">السلة فارغة</p>
    </div>
</div>

<script>
function loadCart() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const container = document.getElementById('cart-container');
    
    if (cart.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 60px 20px; background: var(--card); border-radius: 12px;">
                <i class="fas fa-inbox" style="font-size: 48px; opacity: 0.5; margin-bottom: 20px;"></i>
                <p style="font-size: 18px; color: var(--text-muted);">السلة فارغة</p>
            </div>
        `;
        return;
    }
    
    let html = '<div style="display: grid; gap: 20px;">';
    let total = 0;
    
    cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        
        html += `
            <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="margin-bottom: 10px;">${item.name}</h3>
                    <p style="color: var(--text-muted); font-size: 14px;">السعر: ${item.price} ر.س</p>
                </div>
                <div style="text-align: center;">
                    <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;">الكمية</p>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="btn btn-secondary" onclick="updateQuantity(${index}, ${item.quantity + 1})">+</button>
                        <span style="width: 30px; text-align: center;">${item.quantity}</span>
                        <button class="btn btn-secondary" onclick="updateQuantity(${index}, ${item.quantity - 1})">-</button>
                    </div>
                </div>
                <div>
                    <p style="font-size: 18px; color: var(--success); font-weight: bold;">${itemTotal} ر.س</p>
                    <button class="btn btn-secondary" onclick="removeFromCart(${index})" style="margin-top: 10px;">
                        <i class="fas fa-trash"></i>
                        حذف
                    </button>
                </div>
            </div>
        `;
    });
    
    html += '</div>';
    html += `
        <div class="card" style="margin-top: 30px; padding: 25px; background: rgba(108, 92, 231, 0.1); border: 2px solid var(--primary);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 20px;">الإجمالي:</span>
                <span style="font-size: 28px; color: var(--success); font-weight: bold;">${total} ر.س</span>
            </div>
            <a href="/checkout" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-credit-card"></i>
                المتابعة للدفع
            </a>
        </div>
    `;
    
    container.innerHTML = html;
}

function updateQuantity(index, quantity) {
    if (quantity < 1) return;
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart[index].quantity = quantity;
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
    updateCartBadge();
}

function removeFromCart(index) {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
    updateCartBadge();
}

loadCart();
</script>
{% endblock %}
