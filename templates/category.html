{% extends "base.html" %}

{% block title %}{{ category_id }} - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<style>
    .category-header {
        margin-bottom: 30px;
    }

    .back-link {
        text-decoration: none;
        color: var(--primary-light);
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 20px;
    }

    .filter-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
        border-bottom: 2px solid var(--border);
        padding-bottom: 15px;
    }

    .filter-tab {
        padding: 8px 16px;
        background: transparent;
        color: var(--text-muted);
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-family: 'Tajawal', sans-serif;
        border-bottom: 3px solid transparent;
        transition: all 0.3s ease;
    }

    .filter-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
    }

    .filter-tab:hover {
        color: var(--primary);
    }

    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .product-card {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
    }

    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .product-image {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 60px;
        position: relative;
    }

    .product-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        color: var(--success);
    }

    .product-badge.sold {
        background: rgba(198, 40, 40, 0.95);
        color: white;
    }

    .product-badge.purchased {
        background: rgba(108, 92, 231, 0.95);
        color: white;
    }

    .product-info {
        padding: 15px;
    }

    .product-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
        word-break: break-word;
    }

    .product-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 12px;
        color: var(--text-muted);
    }

    .delivery-type {
        padding: 3px 8px;
        background: var(--primary-light);
        color: white;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
    }

    .product-price {
        font-size: 20px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 12px;
    }

    .product-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .btn-small {
        padding: 8px 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition: all 0.3s ease;
        font-family: 'Tajawal', sans-serif;
    }

    .btn-small:hover {
        background: var(--primary-dark);
    }

    .btn-small.secondary {
        background: var(--border);
        color: var(--text);
    }

    .btn-small.secondary:hover {
        background: var(--text-muted);
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: var(--card);
        border-radius: 12px;
    }

    .empty-state-icon {
        font-size: 60px;
        margin-bottom: 20px;
    }

    .empty-state-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 10px;
    }

    .empty-state-text {
        color: var(--text-muted);
    }

    .alert {
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 13px;
    }

    .alert.success {
        background: var(--success-light);
        color: var(--success);
        border-left: 4px solid var(--success);
    }

    @media (max-width: 768px) {
        .products-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }

        .filter-tabs {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    }
</style>

<div id="alert-container"></div>

<div class="category-header">
    <a href="/" class="back-link">
        <i class="fas fa-arrow-right"></i>
        العودة
    </a>

    <h1 style="font-size: 32px; margin-bottom: 10px;">
        <i class="fas fa-cube"></i>
        {{ category_name or category_id }}
    </h1>
    <p style="color: var(--text-muted);">المنتجات المتاحة</p>
</div>

<div class="filter-tabs">
    <button class="filter-tab active" onclick="filterProducts('available')">
        📦 المنتجات المتاحة
    </button>
    <button class="filter-tab" onclick="filterProducts('sold')">
        ✓ المنتجات المباعة
    </button>
    <button class="filter-tab" onclick="filterProducts('purchased')">
        🎁 مشترياتي
    </button>
</div>

<div id="products-container">
    <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-title">جاري التحميل...</div>
    </div>
</div>

<script>
    let availableProducts = [];
    let soldProducts = [];
    let purchasedProducts = [];
    let currentFilter = 'available';

    document.addEventListener('DOMContentLoaded', async () => {
        await loadProducts();
        filterProducts('available');
    });

    async function loadProducts() {
        try {
            const response = await fetch('/api/category/{{ category_id }}');
            const data = await response.json();

            if (data.status === 'error') {
                showAlert(data.message, 'error');
                return;
            }

            availableProducts = data.available || [];
            soldProducts = data.sold || [];
            purchasedProducts = data.purchased || [];
        } catch (error) {
            console.error('❌ خطأ في تحميل المنتجات:', error);
            showAlert('حدث خطأ في تحميل المنتجات', 'error');
        }
    }

    function filterProducts(filter) {
        currentFilter = filter;

        // تحديث الزر النشط
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        let products = [];
        let title = '';

        if (filter === 'available') {
            products = availableProducts;
            title = 'المنتجات المتاحة';
        } else if (filter === 'sold') {
            products = soldProducts;
            title = 'المنتجات المباعة';
        } else if (filter === 'purchased') {
            products = purchasedProducts;
            title = 'مشترياتي';
        }

        displayProducts(products, filter, title);
    }

    function displayProducts(products, filter, title) {
        const container = document.getElementById('products-container');

        if (products.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        ${filter === 'available' ? '📭' : filter === 'sold' ? '✓' : '🎁'}
                    </div>
                    <div class="empty-state-title">لا توجد منتجات</div>
                    <div class="empty-state-text">${title}</div>
                </div>
            `;
            return;
        }

        let html = '<div class="products-grid">';

        products.forEach(product => {
            const badge = filter === 'sold' ? 
                '<div class="product-badge sold">✓ مباع</div>' :
                filter === 'purchased' ? 
                '<div class="product-badge purchased">🎁 مشتراة</div>' :
                '<div class="product-badge">جديد</div>';

            const deliveryType = product.delivery_type === 'instant' ? '⚡ فوري' : '📦 يدوي';
            const actions = filter === 'available' ? 
                `<button class="btn-small" onclick="addToCart('${product.id}', '${escapeQuotes(product.item_name)}', ${product.price})">
                    🛒 إضافة للسلة
                </button>
                <a href="/product/${product.id}" class="btn-small secondary">
                    👁 عرض
                </a>` :
                `<a href="/product/${product.id}" class="btn-small">
                    👁 عرض التفاصيل
                </a>
                <button class="btn-small secondary" onclick="sharePurchase('${product.id}')">
                    📤 مشاركة
                </button>`;

            html += `
                <div class="product-card">
                    <div class="product-image">
                        📦
                        ${badge}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.item_name)}</div>
                        <div class="product-meta">
                            <span class="delivery-type">${deliveryType}</span>
                            <span style="color: var(--text-muted); font-size: 11px;">
                                ${product.sales_count || 0} مبيعات
                            </span>
                        </div>
                        <div class="product-price">${product.price} ر.س</div>
                        <div class="product-actions">
                            ${actions}
                        </div>
                    </div>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;
    }

    async function addToCart(productId, itemName, price) {
        try {
            const response = await fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    product_id: productId,
                    buyer_details: ''
                })
            });

            const data = await response.json();

            if (data.status === 'success') {
                showAlert('✅ تم إضافة المنتج للسلة!', 'success');
                setTimeout(() => {
                    window.location.href = '/cart';
                }, 1500);
            } else {
                showAlert(data.message || 'حدث خطأ', 'error');
            }
        } catch (error) {
            console.error('❌ خطأ:', error);
            showAlert('حدث خطأ في إضافة المنتج', 'error');
        }
    }

    function sharePurchase(productId) {
        showAlert('linking..... تم نسخ رابط المشتراة في الحافظة', 'success');
    }

    function showAlert(message, type) {
        const container = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = `alert ${type}`;
        alert.textContent = message;
        container.innerHTML = '';
        container.appendChild(alert);

        setTimeout(() => {
            alert.style.opacity = '0';
            alert.style.transition = 'opacity 0.3s ease';
            setTimeout(() => alert.remove(), 300);
        }, 4000);
    }

    function escapeHtml(unsafe) {
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function escapeQuotes(str) {
        return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }
</script>
{% endblock %}
