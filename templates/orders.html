{% extends "base.html" %}

{% block title %}طلباتي - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<h1 style="font-size: 32px; margin-bottom: 30px;">
    <i class="fas fa-receipt"></i>
    طلباتي
</h1>

<div id="orders-container">
    <div style="text-align: center; padding: 60px 20px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 48px; opacity: 0.5; margin-bottom: 20px;"></i>
        <p style="font-size: 18px; color: var(--text-muted);">جاري التحميل...</p>
    </div>
</div>

<script>
function loadOrders() {
    const container = document.getElementById('orders-container');
    
    fetch('/api/get-orders')
    .then(res => res.json())
    .then(data => {
        if (!data.orders || data.orders.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px; background: var(--card); border-radius: 12px;">
                    <i class="fas fa-inbox" style="font-size: 48px; opacity: 0.5; margin-bottom: 20px;"></i>
                    <p style="font-size: 18px; color: var(--text-muted);">لا توجد طلبات حالياً</p>
                </div>
            `;
            return;
        }
        
        let html = '<div style="display: grid; gap: 20px;">';
        
        data.orders.forEach(order => {
            const date = new Date(order.created_at).toLocaleDateString('ar-SA');
            
            html += `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                        <div>
                            <h3 style="margin-bottom: 5px;">طلب #${order.id}</h3>
                            <p style="font-size: 13px; color: var(--text-muted);">التاريخ: ${date}</p>
                        </div>
                        <span style="background: ${order.status === 'completed' ? 'rgba(0, 184, 148, 0.2)' : 'rgba(255, 193, 7, 0.2)'}; color: ${order.status === 'completed' ? 'var(--success)' : 'var(--warning)'}; padding: 8px 16px; border-radius: 20px; font-weight: 600;">
                            ${order.status === 'completed' ? 'مكتمل' : 'قيد الانتظار'}
                        </span>
                    </div>
                    
                    <div style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;">المنتجات:</p>
                        <ul style="list-style: none; padding: 0; margin: 0;">
                            ${order.items.map(item => `
                                <li style="padding: 8px 0; font-size: 14px;">
                                    ${item.name} × ${item.quantity} = ${item.price * item.quantity} ر.س
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 14px; color: var(--text-muted);">الإجمالي:</span>
                        <span style="font-size: 20px; color: var(--success); font-weight: bold;">${order.total_amount} ر.س</span>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(err => {
        container.innerHTML = `
            <div style="text-align: center; padding: 60px 20px; background: rgba(231, 76, 60, 0.1); border-radius: 12px; border: 1px solid rgba(231, 76, 60, 0.3);">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--danger); margin-bottom: 20px;"></i>
                <p style="font-size: 18px; color: var(--danger);">❌ خطأ: ${err.message}</p>
            </div>
        `;
    });
}

loadOrders();
</script>
{% endblock %}
